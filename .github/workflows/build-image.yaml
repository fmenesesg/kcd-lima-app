name: Build and push to GHCR

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build Quarkus app
        run: ./mvnw -B -DskipTests package

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/main/docker/Dockerfile.jvm
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}

      # GHCR packages default to private even when the git repo is public.
      # Publish anonymously-pullable images for Kind / Argo (no imagePullSecret).
      - name: Make GHCR package public
        env:
          GH_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          set -euo pipefail
          OWNER="${{ github.repository_owner }}"
          PKG="${{ github.event.repository.name }}"
          OWNER_TYPE=$(curl -sS -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/users/${OWNER}" | jq -r .type)
          if [ "$OWNER_TYPE" = "Organization" ]; then
            URL="https://api.github.com/orgs/${OWNER}/packages/container/${PKG}/visibility"
          else
            URL="https://api.github.com/user/packages/container/${PKG}/visibility"
          fi
          echo "Setting package ${OWNER}/${PKG} visibility=public via ${URL}"
          HTTP=$(curl -sS -o /tmp/ghcr-vis.out -w "%{http_code}" -X PUT \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$URL" \
            -d '{"visibility":"public"}')
          echo "HTTP ${HTTP}"
          cat /tmp/ghcr-vis.out || true
          # 204 success; 404 if package not yet indexed — retry a few times
          if [ "$HTTP" = "204" ] || [ "$HTTP" = "200" ]; then
            exit 0
          fi
          for i in 1 2 3 4 5; do
            sleep 5
            HTTP=$(curl -sS -o /tmp/ghcr-vis.out -w "%{http_code}" -X PUT \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "$URL" \
              -d '{"visibility":"public"}')
            echo "retry ${i} HTTP ${HTTP}"
            [ "$HTTP" = "204" ] || [ "$HTTP" = "200" ] && exit 0
          done
          echo "Failed to set package visibility" >&2
          cat /tmp/ghcr-vis.out >&2 || true
          exit 1
